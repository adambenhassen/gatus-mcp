# Example: run Gatus and gatus-mcp together.
#
#   cp docker-compose.example.yml docker-compose.yml
#   # provide your own gatus.yaml (see https://gatus.io/docs)
#   docker compose up
#
# The MCP endpoint is then at http://localhost:3000/mcp and talks to Gatus over
# the internal Docker network (GATUS_URL defaults to http://gatus:8080).
services:
  gatus:
    image: twinproduction/gatus:latest
    ports:
      - "8080:8080"
    volumes:
      - ./gatus.yaml:/config/config.yaml:ro

  gatus-mcp:
    build: .
    # Or, once published: image: ghcr.io/adambenhassen/gatus-mcp:latest
    environment:
      GATUS_URL: http://gatus:8080
      MCP_HOST: 0.0.0.0
      MCP_PORT: "3000"
      # GATUS_TOKEN: "..."   # only needed for submit_external_result
    ports:
      - "3000:3000"
    depends_on:
      - gatus
